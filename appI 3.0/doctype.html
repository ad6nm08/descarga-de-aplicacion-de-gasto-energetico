<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gasto energetico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifeest" href="manifest.json">
    <meta name="theme-color" content="#6c7fe8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-title" content="Gasto Energetico">
    <link rel="apple-touch-icon" href="usc.jpg">
</head>
<body>

    <div class="form-container">
        <h2 id="titulo">login</h2>

        <div class="input-box">
            <input type="text" id="username" placeholder="">
            <span>username</span>
        </div>
        <div class="input-box">
            <input type="password" id="password" placeholder="">
            <span>password</span>
        </div>

        <p id="mensaje" style="color:red; text-align:center; font-size:13px; min-height:18px;"></p>

        <button class="submit-btn" id="btnLogin">login</button>
        <button class="submit-btn" id="btnRegistrar"
            style="margin-top:10px; background: transparent;
            border: 2px solid #00f2a9; color:#00f2a9;">
            crear cuenta
        </button>
    </div>

    <script>
        var btnLogin    = document.getElementById('btnLogin');
        var btnRegistrar = document.getElementById('btnRegistrar');
        var mensaje     = document.getElementById('mensaje');

        var USUARIO_ESPECIAL = 'pinguinotactico';
        var USUARIO_ESPECIAL = 'santiagopaz';

        // ── LOGIN ──
        btnLogin.addEventListener('click', function() {
            var user = document.getElementById('username').value.trim();
            var pass = document.getElementById('password').value.trim();

            if (!user) {
                mensaje.style.color = 'red';
                mensaje.textContent = 'Escribe un usuario';
                return;
            }

            // Usuario especial sin contraseña
            if (user === USUARIO_ESPECIAL) {
                localStorage.setItem('sesionActiva', user);
                window.location.href = 'index.html';
                return;
            }

            if (!pass) {
                mensaje.style.color = 'red';
                mensaje.textContent = 'Escribe tu contraseña';
                return;
            }

            var usuarios = JSON.parse(localStorage.getItem('usuarios') || '{}');

            if (!usuarios[user]) {
                mensaje.style.color = 'red';
                mensaje.textContent = 'Usuario no encontrado';
                return;
            }

            if (usuarios[user] !== pass) {
                mensaje.style.color = 'red';
                mensaje.textContent = 'Contraseña incorrecta';
                return;
            }

            localStorage.setItem('sesionActiva', user);
            window.location.href = 'index.html';
        });

        // ── REGISTRAR ──
        btnRegistrar.addEventListener('click', function() {
            var user = document.getElementById('username').value.trim();
            var pass = document.getElementById('password').value.trim();

            if (!user || !pass) {
                mensaje.style.color = 'red';
                mensaje.textContent = 'Completa todos los campos';
                return;
            }

            if (pass.length < 6) {
                mensaje.style.color = 'red';
                mensaje.textContent = 'La contraseña debe tener al menos 6 caracteres';
                return;
            }

            var usuarios = JSON.parse(localStorage.getItem('usuarios') || '{}');

            if (usuarios[user]) {
                mensaje.style.color = 'red';
                mensaje.textContent = 'Ese usuario ya existe';
                return;
            }

            usuarios[user] = pass;
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            mensaje.style.color = 'lightgreen';
            mensaje.textContent = 'Cuenta creada, ahora inicia sesion';
        });
    </script>
<script>
    if ('serviceworker' in navigator) {
        navigation.serviceworker.register('./sw.js');
    }
</script>
</body>
</html>
